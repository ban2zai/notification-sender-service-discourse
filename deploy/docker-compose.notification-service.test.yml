# Test overlay for /var/tools.
# Uses test env, test Redis, test Supabase tables, and test bot.

services:
  notification-redis-test:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - notification_redis_test_data:/data
    networks:
      - default

  notification-service-test:
    build:
      context: ./notification-sender-service-discourse-test/notification-service
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${NOTIFICATION_BOT_TOKEN:?set NOTIFICATION_BOT_TOKEN}
      WEBHOOK_SECRET: ${NOTIFICATION_WEBHOOK_SECRET:?set NOTIFICATION_WEBHOOK_SECRET}
      SUPABASE_URL: ${NOTIFICATION_SUPABASE_URL:-http://supabase-kong:8000}
      SUPABASE_KEY: ${NOTIFICATION_SUPABASE_SERVICE_KEY:?set NOTIFICATION_SUPABASE_SERVICE_KEY}
      REDIS_URL: redis://notification-redis-test:6379
      TELEGRAM_API_URL: ${NOTIFICATION_TELEGRAM_API_URL:-http://telegram-bot-api:8081}
      DISCOURSE_API_KEY: ${NOTIFICATION_DISCOURSE_API_KEY:?set NOTIFICATION_DISCOURSE_API_KEY}
      DISCOURSE_API_USERNAME: ${NOTIFICATION_DISCOURSE_API_USERNAME:-system}
      DISCOURSE_LINKS_TABLE: ${NOTIFICATION_DISCOURSE_LINKS_TABLE:?set NOTIFICATION_DISCOURSE_LINKS_TABLE}
      TELEGRAM_USERS_TABLE: ${NOTIFICATION_TELEGRAM_USERS_TABLE:?set NOTIFICATION_TELEGRAM_USERS_TABLE}
      DISCOURSE_BASE_URL: ${NOTIFICATION_DISCOURSE_BASE_URL:?set NOTIFICATION_DISCOURSE_BASE_URL}
      ACCOUNT_LINK_API_TOKEN: ${NOTIFICATION_ACCOUNT_LINK_API_TOKEN:?set NOTIFICATION_ACCOUNT_LINK_API_TOKEN}
      ACCOUNT_LINK_TOKEN_TTL_SECONDS: ${NOTIFICATION_ACCOUNT_LINK_TOKEN_TTL_SECONDS:-600}
      PORT: ${NOTIFICATION_PORT:-8067}
      LOG_LEVEL: ${NOTIFICATION_LOG_LEVEL:-DEBUG}
      NOTIFICATION_LOG_PAYLOAD_DATA: ${NOTIFICATION_LOG_PAYLOAD_DATA:-false}
      REDIS_STREAM: ${NOTIFICATION_REDIS_STREAM:-tg_notifications}
      REDIS_GROUP: ${NOTIFICATION_REDIS_GROUP:-drain}
      STREAM_MAXLEN: ${NOTIFICATION_STREAM_MAXLEN:-10000}
      IDEMPOTENCY_TTL_SECONDS: ${NOTIFICATION_IDEMPOTENCY_TTL_SECONDS:-86400}
      DRAIN_BATCH_SIZE: ${NOTIFICATION_DRAIN_BATCH_SIZE:-25}
      DRAIN_BLOCK_MS: ${NOTIFICATION_DRAIN_BLOCK_MS:-5000}
      MAX_ATTEMPTS: ${NOTIFICATION_MAX_ATTEMPTS:-5}
      REAPER_INTERVAL_SECONDS: ${NOTIFICATION_REAPER_INTERVAL_SECONDS:-120}
      REAPER_IDLE_MS: ${NOTIFICATION_REAPER_IDLE_MS:-120000}
      REAPER_BATCH_SIZE: ${NOTIFICATION_REAPER_BATCH_SIZE:-100}
      TELEGRAM_GLOBAL_RATE_PER_SECOND: ${NOTIFICATION_TELEGRAM_GLOBAL_RATE_PER_SECOND:-50}
      TELEGRAM_CHAT_MIN_INTERVAL_SECONDS: ${NOTIFICATION_TELEGRAM_CHAT_MIN_INTERVAL_SECONDS:-1.05}
      SUPABASE_LINKS_CACHE_ENABLED: ${NOTIFICATION_SUPABASE_LINKS_CACHE_ENABLED:-true}
      SUPABASE_LINKS_CACHE_REFRESH_SECONDS: ${NOTIFICATION_SUPABASE_LINKS_CACHE_REFRESH_SECONDS:-60}
      SUPABASE_LINKS_CACHE_STALE_SECONDS: ${NOTIFICATION_SUPABASE_LINKS_CACHE_STALE_SECONDS:-1800}
      SUPABASE_LINKS_DIRECT_LOOKUP_ON_MISS: ${NOTIFICATION_SUPABASE_LINKS_DIRECT_LOOKUP_ON_MISS:-true}
      DISCOURSE_API_TIMEOUT_SECONDS: ${NOTIFICATION_DISCOURSE_API_TIMEOUT_SECONDS:-3}
      DISCOURSE_TOPIC_CACHE_TTL_SECONDS: ${NOTIFICATION_DISCOURSE_TOPIC_CACHE_TTL_SECONDS:-1800}
      DISCOURSE_POST_CACHE_TTL_SECONDS: ${NOTIFICATION_DISCOURSE_POST_CACHE_TTL_SECONDS:-1800}
      DISCOURSE_CATEGORIES_CACHE_TTL_SECONDS: ${NOTIFICATION_DISCOURSE_CATEGORIES_CACHE_TTL_SECONDS:-43200}
      TELEGRAM_EXCERPT_MAX_CHARS: ${NOTIFICATION_TELEGRAM_EXCERPT_MAX_CHARS:-400}
    depends_on:
      - notification-redis-test
      - telegram-bot-api
    networks:
      - default
      - supabase_default
      - proxy_network

volumes:
  notification_redis_test_data:
