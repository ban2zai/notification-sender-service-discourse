# Локальный compose для разработки/проверки этой репы.
# Для продуктового VPS с существующим /var/tools/docker-compose.yml используй
# deploy/docker-compose.notification-service.yml как overlay, чтобы не плодить
# отдельную default-сеть и не отрезать сервис от telegram-bot-api.
services:
  notification-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - notification_redis_data:/data
    networks:
      - default

  notification-service:
    build: ./notification-service
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET}
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase-kong:8000}
      SUPABASE_KEY: ${SUPABASE_SERVICE_KEY:?set SUPABASE_SERVICE_KEY}
      REDIS_URL: ${REDIS_URL:-redis://notification-redis:6379}
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-http://telegram-bot-api:8081}
      DISCOURSE_API_KEY: ${DISCOURSE_API_KEY:?set DISCOURSE_API_KEY}
      DISCOURSE_API_USERNAME: ${DISCOURSE_API_USERNAME:-system}
      DISCOURSE_LINKS_TABLE: ${DISCOURSE_LINKS_TABLE:?set DISCOURSE_LINKS_TABLE}
      TELEGRAM_USERS_TABLE: ${TELEGRAM_USERS_TABLE:?set TELEGRAM_USERS_TABLE}
      DISCOURSE_BASE_URL: ${DISCOURSE_BASE_URL:?set DISCOURSE_BASE_URL}
      ACCOUNT_LINK_API_TOKEN: ${ACCOUNT_LINK_API_TOKEN:?set ACCOUNT_LINK_API_TOKEN}
      ACCOUNT_LINK_TOKEN_TTL_SECONDS: ${ACCOUNT_LINK_TOKEN_TTL_SECONDS:-600}
      PORT: ${PORT:-8067}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      NOTIFICATION_LOG_PAYLOAD_DATA: ${NOTIFICATION_LOG_PAYLOAD_DATA:-false}
      REDIS_STREAM: ${REDIS_STREAM:-tg_notifications}
      REDIS_GROUP: ${REDIS_GROUP:-drain}
      STREAM_MAXLEN: ${STREAM_MAXLEN:-10000}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
      DRAIN_BATCH_SIZE: ${DRAIN_BATCH_SIZE:-25}
      DRAIN_BLOCK_MS: ${DRAIN_BLOCK_MS:-5000}
      MAX_ATTEMPTS: ${MAX_ATTEMPTS:-5}
      REAPER_INTERVAL_SECONDS: ${REAPER_INTERVAL_SECONDS:-120}
      REAPER_IDLE_MS: ${REAPER_IDLE_MS:-120000}
      REAPER_BATCH_SIZE: ${REAPER_BATCH_SIZE:-100}
      TELEGRAM_GLOBAL_RATE_PER_SECOND: ${TELEGRAM_GLOBAL_RATE_PER_SECOND:-50}
      TELEGRAM_CHAT_MIN_INTERVAL_SECONDS: ${TELEGRAM_CHAT_MIN_INTERVAL_SECONDS:-1.05}
      SUPABASE_LINKS_CACHE_ENABLED: ${SUPABASE_LINKS_CACHE_ENABLED:-true}
      SUPABASE_LINKS_CACHE_REFRESH_SECONDS: ${SUPABASE_LINKS_CACHE_REFRESH_SECONDS:-60}
      SUPABASE_LINKS_CACHE_STALE_SECONDS: ${SUPABASE_LINKS_CACHE_STALE_SECONDS:-1800}
      SUPABASE_LINKS_DIRECT_LOOKUP_ON_MISS: ${SUPABASE_LINKS_DIRECT_LOOKUP_ON_MISS:-true}
      DISCOURSE_API_TIMEOUT_SECONDS: ${DISCOURSE_API_TIMEOUT_SECONDS:-3}
      DISCOURSE_TOPIC_CACHE_TTL_SECONDS: ${DISCOURSE_TOPIC_CACHE_TTL_SECONDS:-1800}
      DISCOURSE_POST_CACHE_TTL_SECONDS: ${DISCOURSE_POST_CACHE_TTL_SECONDS:-1800}
      DISCOURSE_CATEGORIES_CACHE_TTL_SECONDS: ${DISCOURSE_CATEGORIES_CACHE_TTL_SECONDS:-43200}
      TELEGRAM_EXCERPT_MAX_CHARS: ${TELEGRAM_EXCERPT_MAX_CHARS:-400}
    depends_on:
      - notification-redis
    networks:
      - default
      - supabase_default
      - proxy_network

volumes:
  notification_redis_data:

networks:
  supabase_default:
    external: true
  proxy_network:
    external: true
